  /v1/task/{id}/logs:
    get:
      summary: Get Task Logs
      description: Retrieve task logs sorted from newest to oldest.
      tags:
        - Tasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Unique identifier of the task to retrieve logs for.
        - name: level
          in: query
          required: false
          schema:
            type: string
          description: Filter logs by level.
        - name: issuer
          in: query
          required: false
          schema:
            type: string
          description: Filter logs by issuer.
        - name: time-range-from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Start of the time range filter. Must be used with time-range-to and be more recent.
        - name: time-range-to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: End of the time range filter. Must be used with time-range-from and be less recent.
      responses:
        "200":
          description: Task logs.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskLog"
        "400":
          $ref: "#/components/responses/GenericBadRequest"
        "401":
          $ref: "#/components/responses/GenericUnauthenticated"
        "403":
          $ref: "#/components/responses/GenericForbidden"
        "404":
          $ref: "#/components/responses/GenericNotFound"
        "500":
          $ref: "#/components/responses/GenericInternalServerError"
      security:
        - BasicAuth: []
components:
  schemas:
    CreateTaskRequest:
      type: object
      required:
        - source
      properties:
        source:
          type: string
          description: Task source in the form namespace:name/interface/function@<hash|tag>.
        params:
          type: array
          description: Parameters passed to the task.
          items: {}
        args:
          type: array
          description: Argument list used to invoke the task.
          items:
            type: string
        env:
          type: array
          description: Environment variables supplied to the task.
          items:
            $ref: "#/components/schemas/EnvironmentVariable"
        callback:
          type: string
          format: uri
          description: Callback URL invoked on task completion.
        retention:
          type: string
          description: Duration to retain the task after completion.
        retries:
          type: integer
          description: Maximum number of retries before the task is moved to state archived
    Task:
      type: object
      required:
        - id
        - source
        - status
      properties:
        id:
          type: string
          description: Unique identifier for the task.
        source:
          type: string
          description: Task source in the form namespace:name/interface/function@<hash|tag>.
        params:
          type: array
          description: Parameters passed to the task.
          items: {}
        args:
          type: array
          description: Argument list used to invoke the task.
          items:
            type: string
        env:
          type: array
          description: Environment variables supplied to the task.
          items:
            $ref: "#/components/schemas/EnvironmentVariable"
        callback:
          type: string
          format: uri
          description: Callback URL invoked on task completion.
        retention:
          type: string
          description: Duration to retain the task after completion.
        retries:
          type: integer
          description: Maximum number of retries before the task is moved to state archived
        status:
          $ref: "#/components/schemas/TaskStatus"
    TaskStatus:
      type: object
      required:
        - retries
        - max_retries
        - state
      properties:
        retries:
          type: integer
          description: Current retry count.
        state:
          type: string
          description: Current status of the task.
        result_payload:
          type: string
          description: Result payload of the task.
        last_error:
          type: string
          description: Error message from the last failure.
        last_failed_at:
          type: string
          format: date-time
          description: Time of the last failure.
        next_process_at:
          type: string
          format: date-time
          description: Time the task is scheduled for processing next.
        completed_at:
          type: string
          format: date-time
          description: Time the task finished processing.
    TaskLog:
      type: object
      required:
        - timestamp
        - level
        - issuer
        - message
      properties:
        timestamp:
          type: string
          format: date-time
          description: Time the log entry was created.
        level:
          type: string
          description: Log level (e.g., debug, info, warn, error, fatal).
        issuer:
          type: string
          description: Component that issued the log entry.
        message:
          type: string
          description: Log message content.
    EnvironmentVariable:
      type: object
      required:
        - key
        - value
      properties:
        key:
          type: string
          description: Environment variable name.
        value:
          type: string
          description: Environment variable value.
    ErrGeneric:
      type: object
      required:
        - error
      properties:
        error:
          type: string
    ErrField:
      type: object
      required:
        - field
        - error
      properties:
        field:
          type: string
          description: The name of the field that caused the error.
        error:
          type: string
          description: A description of the error related to the field.
    UserResponse:
      type: object
      required:
        - name
        - displayName
      properties:
        name:
          type: string
          description: The name of the user.
        displayName:
          type: string
          description: The display name of the user.
        roles:
          type: array
          description: Roles assigned to the user.
          items:
            type: string
    PutUserRequest:
      type: object
      required:
        - password
        - displayName
      properties:
        password:
          type: string
          description: The password for the new user.
        displayName:
          type: string
          description: The display name for the new user.
        roles:
          type: array
          description: Roles assigned to the new user.
          items:
            type: string
    PatchUser:
      type: object
      properties:
        password:
          type: string
          description: The password for the user.
        displayName:
          type: string
          description: The display name for the user.
        roles:
          type: array
          description: Roles assigned to the user.
          items:
            type: string
    PatchMe:
      type: object
      properties:
        password:
          type: string
          description: The password for the current user.
        displayName:
          type: string
          description: The display name for the current user.
        roles:
          type: array
          description: Roles assigned to the current user.
          items:
            type: string
    RBACPolicy:
      type: object
      required:
        - resourceGroup
        - role
        - method
      properties:
        role:
          type: string
          description: The name of the role. (or "*" for all roles)
        resourceGroup:
          type: string
          description: The name of the resource group. (or "*" for all resource groups)
        method:
          type: string
          enum:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - HEAD
            - "*"
          description: The allowed HTTP method (e.g., "GET", "POST", "*").
    RoleResource:
      type: object
      required:
        - name
        - users
      properties:
        name:
          type: string
          description: The role name.
        users:
          type: array
          description: Usernames assigned to this role.
          items:
            type: string
    PutRoleRequest:
      type: object
      required:
        - users
      properties:
        users:
          type: array
          description: Usernames assigned to this role.
          items:
            type: string
    ResourceGroupResource:
      type: object
      required:
        - name
        - endpoints
      properties:
        name:
          type: string
          description: The resource group name.
        endpoints:
          type: array
          description: Endpoints assigned to this resource group.
          items:
            type: string
    PutResourceGroupRequest:
      type: object
      required:
        - endpoints
      properties:
        endpoints:
          type: array
          description: Endpoints assigned to this resource group.
          items:
            type: string
    Artifact:
      type: object
      description: Metadata of an artifact version.
      required:
        - namespace
        - name
        - versionHash
        - createdAt
        - pulls
        - tags
      properties:
        namespace:
          type: string
          description: Namespace of the artifact.
        name:
          type: string
          description: Name of the artifact.
        versionHash:
          type: string
          description: Version hash of the artifact.
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp of the artifact.
        pulls:
          type: integer
          description: Number of times the artifact has been pulled.
        tags:
          type: array
          description: Tags associated with the artifact.
          items:
            type: string
    PatchArtifact:
      type: object
      properties:
        tags:
          type: array
          description: Tags to assign to the artifact version. When set, replaces the existing tags.
          items:
            type: string
    UploadArtifactResponse:
      type: object
      required:
        - versionHash
      properties:
        versionHash:
          type: string
          description: Created version hash.
  responses:
    GenericBadRequest:
      description: "The request was malformed or invalid."
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrGeneric"
    GenericUnauthenticated:
      description: "The provided authentication credentials were invalid."
    GenericForbidden:
      description: "The authenticated user does not have permission to access the requested resource."
    GenericNotFound:
      description: "The requested resource was not found."
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrGeneric"
    GenericTooLarge:
      description: "The request payload is too large."
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrGeneric"
    FieldError:
      description: "One or more fields were invalid."
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  $ref: "#/components/schemas/ErrField"
    GenericInternalServerError:
      description: "An internal server error occurred. Look at the server logs for more details."
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic

