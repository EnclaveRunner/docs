openapi: "3.0.3"
info:
  title: Enclave API Server
  description: The entrypoint for all Enclave API requests and communication.
  version: "v0.3.1"
tags:
  - name: Users
    description: Operations related to user management.
  - name: RBAC
    description: Operations related to role-based access control.
  - name: Artifacts
    description: Operations related to artifacts management.
  - name: Tasks
    description: Operations related to task management.
paths:
  /v1/user:
    get:
      summary: List Users
      description: Retrieve a paginated list of users.
      tags:
        - Users
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Maximum number of users to return.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
          description: Offset into the user list.
        - name: name
          in: query
          required: false
          schema:
            type: string
          description: Filter by exact username.
        - name: display-name
          in: query
          required: false
          schema:
            type: string
          description: Filter by display name.
      responses:
        "200":
          description: Successful response with a list of users.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/GenericBadRequest"
        "401":
          $ref: "#/components/responses/GenericUnauthenticated"
        "403":
          $ref: "#/components/responses/GenericForbidden"
        "413":
          $ref: "#/components/responses/GenericTooLarge"
        "500":
          $ref: "#/components/responses/GenericInternalServerError"
      security:
        - BasicAuth: []
  /v1/user/{username}:
    parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
        description: Unique name of the user.
    put:
      summary: Create User
      description: Create a new user with the provided username.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutUserRequest"
      responses:
        "201":
          description: User created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/GenericBadRequest"
        "401":
          $ref: "#/components/responses/GenericUnauthenticated"
        "403":
          $ref: "#/components/responses/GenericForbidden"
        "409":
          description: "User already exists."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrGeneric"
        "413":
          $ref: "#/components/responses/GenericTooLarge"
        "500":
          $ref: "#/components/responses/GenericInternalServerError"
      security:
        - BasicAuth: []
    get:
      summary: Get User
      description: Retrieve information about a specific user by username.
      tags:
        - Users
      responses:
        "200":
          description: Successful response with user information.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/GenericBadRequest"
        "401":
          $ref: "#/components/responses/GenericUnauthenticated"
        "403":
          $ref: "#/components/responses/GenericForbidden"
        "404":
          $ref: "#/components/responses/GenericNotFound"
        "413":
          $ref: "#/components/responses/GenericTooLarge"
        "500":
          $ref: "#/components/responses/GenericInternalServerError"
      security:
        - BasicAuth: []
    head:
      summary: Check User Existence
      description: Check if a specific user exists by username.
      tags:
        - Users
      responses:
        "200":
          description: User exists.
        "404":
          description: User does not exist.
        "400":
          description: Bad request.
        "401":
          description: Unauthorized.
        "403":
          description: Forbidden.
        "413":
          $ref: "#/components/responses/GenericTooLarge"
        "500":
          description: Internal server error.
      security:
        - BasicAuth: []
    patch:
      summary: Update User
      description: Update information for an existing user. Only provided fields will be updated.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchUser"
      responses:
        "200":
          description: User updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/GenericBadRequest"
        "401":
          $ref: "#/components/responses/GenericUnauthenticated"
        "403":
          $ref: "#/components/responses/GenericForbidden"
        "404":
          $ref: "#/components/responses/GenericNotFound"
        "409":
          description: "User already exists with the new name."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrGeneric"
        "413":
          $ref: "#/components/responses/GenericTooLarge"
        "500":
          $ref: "#/components/responses/GenericInternalServerError"
      security:
        - BasicAuth: []
    delete:
      summary: Delete User
      description: Delete an existing user.
      tags:
        - Users
      responses:
        "200":
          description: User deleted successfully. Returns the deleted user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/GenericBadRequest"
        "401":
          $ref: "#/components/responses/GenericUnauthenticated"
        "403":
          $ref: "#/components/responses/GenericForbidden"
        "404":
          $ref: "#/components/responses/GenericNotFound"
        "413":
          $ref: "#/components/responses/GenericTooLarge"
        "500":
          $ref: "#/components/responses/GenericInternalServerError"
      security:
        - BasicAuth: []
  /v1/user/me:
    get:
      summary: Get Current User
      description: Retrieve information about the currently authenticated user.
      tags:
        - Users
      responses:
        "200":
          description: Successful response with current user information.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/GenericUnauthenticated"
        "403":
          $ref: "#/components/responses/GenericForbidden"
        "413":
          $ref: "#/components/responses/GenericTooLarge"
        "500":
          $ref: "#/components/responses/GenericInternalServerError"
      security:
        - BasicAuth: []
    patch:
      summary: Update Current User
      description: Update information for the currently authenticated user. Only provided fields will be updated.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchMe"
      responses:
        "200":
          description: Current user updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/GenericBadRequest"
        "401":
          $ref: "#/components/responses/GenericUnauthenticated"
        "403":
          $ref: "#/components/responses/GenericForbidden"
        "409":
          description: "User already exists with the new name."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrGeneric"
        "413":
          $ref: "#/components/responses/GenericTooLarge"
        "500":
          $ref: "#/components/responses/GenericInternalServerError"
      security:
        - BasicAuth: []
    delete:
      summary: Delete Current User
      description: Delete the currently authenticated user.
      tags:
        - Users
      responses:
        "200":
          description: Current user deleted successfully. Returns the deleted user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/GenericUnauthenticated"
        "403":
          $ref: "#/components/responses/GenericForbidden"
        "413":
          $ref: "#/components/responses/GenericTooLarge"
        "500":
          $ref: "#/components/responses/GenericInternalServerError"
      security:
        - BasicAuth: []
  /v1/rbac/role:
    get:
      summary: List All Roles
      description: Retrieve a list of all roles in the system.
      tags:
        - RBAC
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Maximum number of policies to return.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
          description: Offset into the policy list.
        - name: role
          in: query
          required: false
          schema:
            type: string
          description: Filter policies by role.
      responses:
        "200":
          description: Successful response with a list of roles.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoleResource"
        "401":
          $ref: "#/components/responses/GenericUnauthenticated"
        "403":
          $ref: "#/components/responses/GenericForbidden"
        "413":
          $ref: "#/components/responses/GenericTooLarge"
        "500":
          $ref: "#/components/responses/GenericInternalServerError"
      security:
        - BasicAuth: []
  /v1/rbac/role/{role}:
    parameters:
      - name: role
        in: path
        required: true
        schema:
          type: string
        description: The name of the role.
    get:
      summary: Get assigned users for role
      description: Retrieve a role resource.
      tags:
        - RBAC
      responses:
        "200":
          description: Successful response with the role resource.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleResource"
        "400":
          $ref: "#/components/responses/GenericBadRequest"
        "401":
          $ref: "#/components/responses/GenericUnauthenticated"
        "403":
          $ref: "#/components/responses/GenericForbidden"
        "404":
          $ref: "#/components/responses/GenericNotFound"
        "413":
          $ref: "#/components/responses/GenericTooLarge"
        "500":
          $ref: "#/components/responses/GenericInternalServerError"
      security:
        - BasicAuth: []
    head:
      summary: Check Role Existence
      description: Check if a specific role exists in the system.
      tags:
        - RBAC
      responses:
        "200":
          description: Role exists.
        "404":
          description: Role does not exist.
        "400":
          description: Bad request.
        "401":
          description: Unauthorized.
        "403":
          description: Forbidden.
        "413":
          $ref: "#/components/responses/GenericTooLarge"
        "500":
          description: Internal server error.
      security:
        - BasicAuth: []
    put:
      summary: Create or Replace Role
      description: Create a new role or replace an existing one at the specified role name.
      tags:
        - RBAC
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutRoleRequest"
      responses:
        "201":
          description: Role created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleResource"
        "400":
          $ref: "#/components/responses/GenericBadRequest"
        "401":
          $ref: "#/components/responses/GenericUnauthenticated"
        "403":
          $ref: "#/components/responses/GenericForbidden"
        "409":
          description: "Role already exists."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrGeneric"
        "413":
          $ref: "#/components/responses/GenericTooLarge"
        "500":
          $ref: "#/components/responses/GenericInternalServerError"
      security:
        - BasicAuth: []
    delete:
      summary: Delete Role
      description: Delete role from the system.
      tags:
        - RBAC
      responses:
        "200":
          description: Roles deleted successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleResource"
        "400":
          $ref: "#/components/responses/GenericBadRequest"
        "401":
          $ref: "#/components/responses/GenericUnauthenticated"
        "403":
          $ref: "#/components/responses/GenericForbidden"
        "404":
          $ref: "#/components/responses/GenericNotFound"
        "409":
          description: "Tried to delete enclave admin role"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrGeneric"
        "413":
          $ref: "#/components/responses/GenericTooLarge"
        "500":
          $ref: "#/components/responses/GenericInternalServerError"
      security:
        - BasicAuth: []
  /v1/rbac/resource-group:
    get:
      summary: List All Resource Groups
      description: Retrieve a list of all resource groups in the system.
      tags:
        - RBAC
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Maximum number of policies to return.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
          description: Offset into the policy list.
        - name: role
          in: query
          required: false
          schema:
            type: string
          description: Filter policies by role.
      responses:
        "200":
          description: Successful response with a list of resource groups.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResourceGroupResource"
        "401":
          $ref: "#/components/responses/GenericUnauthenticated"
        "403":
          $ref: "#/components/responses/GenericForbidden"
        "413":
          $ref: "#/components/responses/GenericTooLarge"
        "500":
          $ref: "#/components/responses/GenericInternalServerError"
      security:
        - BasicAuth: []
  /v1/rbac/resource-group/{resourceGroup}:
    parameters:
      - name: resourceGroup
        in: path
        required: true
        schema:
          type: string
        description: The name of the resource group.
    get:
      summary: Get Endpoints Assigned to Resource Group
      description: Retrieve a resource group resource.
      tags:
        - RBAC
      responses:
        "200":
          description: Successful response with the resource group resource.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceGroupResource"
        "400":
          $ref: "#/components/responses/GenericBadRequest"
        "401":
          $ref: "#/components/responses/GenericUnauthenticated"
        "403":
          $ref: "#/components/responses/GenericForbidden"
        "404":
          $ref: "#/components/responses/GenericNotFound"
        "413":
          $ref: "#/components/responses/GenericTooLarge"
        "500":
          $ref: "#/components/responses/GenericInternalServerError"
      security:
        - BasicAuth: []
    head:
      summary: Check Resource Group Existence
      description: Check if a specific resource group exists in the system.
      tags:
        - RBAC
      responses:
        "200":
          description: Resource group exists.
        "404":
          description: Resource group does not exist.
        "400":
          description: Bad request.
        "401":
          description: Unauthorized.
        "403":
          description: Forbidden.
        "413":
          $ref: "#/components/responses/GenericTooLarge"
        "500":
          description: Internal server error.
      security:
        - BasicAuth: []
    put:
      summary: Create or Replace Resource Group
      description: Create a new resource group or replace an existing one at the specified name.
      tags:
        - RBAC
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutResourceGroupRequest"
      responses:
        "201":
          description: Resource group created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceGroupResource"
        "400":
          $ref: "#/components/responses/GenericBadRequest"
        "401":
          $ref: "#/components/responses/GenericUnauthenticated"
        "403":
          $ref: "#/components/responses/GenericForbidden"
        "409":
          description: "Resource group already exists."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrGeneric"
        "413":
          $ref: "#/components/responses/GenericTooLarge"
        "500":
          $ref: "#/components/responses/GenericInternalServerError"
      security:
        - BasicAuth: []
    delete:
      summary: Delete Resource Group
      description: Delete an existing resource group.
      tags:
        - RBAC
      responses:
        "200":
          description: Resource group deleted successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceGroupResource"
        "400":
          $ref: "#/components/responses/GenericBadRequest"
        "401":
          $ref: "#/components/responses/GenericUnauthenticated"
        "403":
          $ref: "#/components/responses/GenericForbidden"
        "404":
          $ref: "#/components/responses/GenericNotFound"
        "413":
          $ref: "#/components/responses/GenericTooLarge"
        "500":
          $ref: "#/components/responses/GenericInternalServerError"
      security:
        - BasicAuth: []
  /v1/rbac/policy:
    get:
      summary: List RBAC Policies
      description: Retrieve a list of role-based access control (RBAC) policies.
      tags:
        - RBAC
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Maximum number of policies to return.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
          description: Offset into the policy list.
        - name: role
          in: query
          required: false
          schema:
            type: string
          description: Filter policies by role.
        - name: resource-group
          in: query
          required: false
          schema:
            type: string
          description: Filter policies by resource group.
        - name: method
          in: query
          required: false
          schema:
            type: string
          description: Filter policies by HTTP method.
      responses:
        "200":
          description: Successful response with a list of RBAC policies.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RBACPolicy"
        "401":
          $ref: "#/components/responses/GenericUnauthenticated"
        "403":
          $ref: "#/components/responses/GenericForbidden"
        "413":
          $ref: "#/components/responses/GenericTooLarge"
        "500":
          $ref: "#/components/responses/GenericInternalServerError"
      security:
        - BasicAuth: []
    put:
      summary: Create or Replace RBAC Policy
      description: Create a new role-based access control (RBAC) policy or replace an existing one for the provided tuple.
      tags:
        - RBAC
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RBACPolicy"
      responses:
        "201":
          description: RBAC policy created successfully.
        "400":
          $ref: "#/components/responses/GenericBadRequest"
        "401":
          $ref: "#/components/responses/GenericUnauthenticated"
        "403":
          $ref: "#/components/responses/GenericForbidden"
        "404":
          $ref: "#/components/responses/FieldError"
        "413":
          $ref: "#/components/responses/GenericTooLarge"
        "500":
          $ref: "#/components/responses/GenericInternalServerError"
      security:
        - BasicAuth: []
    delete:
      summary: Delete RBAC Policy
      description: Delete an existing role-based access control (RBAC) policy for the provided tuple, if it existed.
      tags:
        - RBAC
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RBACPolicy"
      responses:
        "200":
          description: RBAC policy deleted successfully.
        "400":
          $ref: "#/components/responses/GenericBadRequest"
        "401":
          $ref: "#/components/responses/GenericUnauthenticated"
        "403":
          $ref: "#/components/responses/GenericForbidden"
        "409":
          description: "Tried to delete enclave admin policy"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrGeneric"
        "413":
          $ref: "#/components/responses/GenericTooLarge"
        "500":
          $ref: "#/components/responses/GenericInternalServerError"
      security:
        - BasicAuth: []
  /v1/artifact/raw/{namespace}/{name}:
    post:
      summary: Upload Artifact
      description: Upload raw artifact content for a package; returns the created version hash.
      tags:
        - Artifacts
      parameters:
        - name: namespace
          in: path
          required: true
          schema:
            type: string
          description: Artifact namespace.
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Artifact name.
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "201":
          description: Artifact uploaded successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadArtifactResponse"
        "400":
          $ref: "#/components/responses/GenericBadRequest"
        "401":
          $ref: "#/components/responses/GenericUnauthenticated"
        "403":
          $ref: "#/components/responses/GenericForbidden"
        "409":
          description: Artifact already exists at the provided tag or hash.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrGeneric"
        "413":
          $ref: "#/components/responses/GenericTooLarge"
        "500":
          $ref: "#/components/responses/GenericInternalServerError"
      security:
        - BasicAuth: []
  /v1/artifact:
    get:
      summary: List Artifact Namespaces
      description: Retrieve a paginated list of artifact namespaces.
      tags:
        - Artifacts
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Maximum number of namespaces to return.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
          description: Offset into the namespace list.
      responses:
        "200":
          description: Artifact namespace list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Artifact"
        "400":
          $ref: "#/components/responses/GenericBadRequest"
        "401":
          $ref: "#/components/responses/GenericUnauthenticated"
        "403":
          $ref: "#/components/responses/GenericForbidden"
        "413":
          $ref: "#/components/responses/GenericTooLarge"
        "500":
          $ref: "#/components/responses/GenericInternalServerError"
      security:
        - BasicAuth: []
  /v1/artifact/{namespace}:
    get:
      summary: List Artifacts in Namespace
      description: Retrieve a paginated list of artifacts for a namespace.
      tags:
        - Artifacts
      parameters:
        - name: namespace
          in: path
          required: true
          schema:
            type: string
          description: Artifact namespace.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Maximum number of artifacts to return.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
          description: Offset into the artifact list.
      responses:
        "200":
          description: Artifact list for namespace.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Artifact"
        "400":
          $ref: "#/components/responses/GenericBadRequest"
        "401":
          $ref: "#/components/responses/GenericUnauthenticated"
        "403":
          $ref: "#/components/responses/GenericForbidden"
        "413":
          $ref: "#/components/responses/GenericTooLarge"
        "500":
          $ref: "#/components/responses/GenericInternalServerError"
      security:
        - BasicAuth: []
  /v1/artifact/{namespace}/{name}:
    get:
      summary: List Artifact Versions
      description: Retrieve a paginated list of versions for an artifact.
      tags:
        - Artifacts
      parameters:
        - name: namespace
          in: path
          required: true
          schema:
            type: string
          description: Artifact namespace.
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Artifact name.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Maximum number of versions to return.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
          description: Offset into the version list.
      responses:
        "200":
          description: Artifact version list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Artifact"
        "400":
          $ref: "#/components/responses/GenericBadRequest"
        "401":
          $ref: "#/components/responses/GenericUnauthenticated"
        "403":
          $ref: "#/components/responses/GenericForbidden"
        "413":
          $ref: "#/components/responses/GenericTooLarge"
